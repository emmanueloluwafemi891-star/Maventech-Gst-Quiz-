<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MavenTech GST CBT Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <h1>MavenTech Website</h1>
    <p>Created for students to prepare for their upcoming examinations.</p>
  </header>

  <!-- Quiz Container -->
  <main class="container">

    <!-- Timer -->
    <div class="timer-box">
      Time Left: <span id="timer">10:00</span>
    </div>

    <!-- Quiz Box -->
    <div class="quiz-box">

      <h2 id="question-number">
        Question 1 of 20
      </h2>

      <h3 id="question">
        Loading question...
      </h3>

      <div id="options">
        <!-- Options will appear here -->
      </div>

      <button id="next-btn">
        Next ➜
      </button>

    </div>

    <!-- Result Section -->
    <div id="result" class="hidden">
      <!-- Score and corrections will appear here -->
    </div>

  </main>

  <script src="script.js"></script>

</body>
</html>
